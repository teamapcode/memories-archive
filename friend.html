<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5" />
    <title>My Story • دوست من</title>
    <link rel="icon" type="image/jpg" href="favicon.jpg" />
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;350;400;500;700&display=swap" rel="stylesheet" />
    <style>
        :root {
            --color-cream: #FDFCF0;
            --color-cream-light: #FFFEF8;
            --color-sky-blue: #D1E9F6;
            --color-lavender: #E6E6FA;
            --color-purple-soft: #D4C5F9;
            --color-purple-card: #EDE4F8;
            --color-soft-brown: #334756;
            --color-charcoal: #2A3A47;
            --shadow-soft: 0 8px 28px rgba(160, 130, 200, 0.20);
            --shadow-float: 0 16px 48px rgba(160, 130, 200, 0.30);
            --font-primary: 'Vazirmatn', 'Segoe UI', system-ui, sans-serif;
            --font-weight-light: 300;
            --font-weight-regular: 350;
            --font-weight-medium: 400;
            --font-weight-bold: 500;
            --font-weight-extra-bold: 700;
            --radius-xl: 48px;
            --radius-lg: 32px;
            --radius-md: 24px;
            --radius-sm: 16px;
            --radius-xs: 12px;
            --transition-slow: 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            --transition-medium: 0.4s ease;
            --transition-fade: 0.8s ease;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font-primary);
            font-weight: var(--font-weight-regular);
            color: var(--color-soft-brown);
            background: var(--color-cream);
            background-image: radial-gradient(circle at 20% 30%, rgba(209, 233, 246, 0.15) 0%, transparent 50%), radial-gradient(circle at 80% 70%, rgba(230, 230, 250, 0.1) 0%, transparent 50%);
            min-height: 100vh;
            direction: rtl;
            padding: 1.5rem;
        }
        .cloud-float-left { position: fixed; left: 20px; bottom: 15%; font-size: 4.5rem; opacity: 0.3; animation: floatSway 6s ease-in-out infinite alternate; z-index: 0; pointer-events: none; color: #4A8DB7 !important; -webkit-text-stroke: 2px #4A8DB7 !important; }
        .cloud-float-right { position: fixed; right: 20px; top: 20%; font-size: 5rem; opacity: 0.25; animation: floatSway 7s ease-in-out infinite alternate-reverse; z-index: 0; pointer-events: none; color: #4A8DB7 !important; -webkit-text-stroke: 2px #4A8DB7 !important; }
        .cloud-float-center { position: fixed; left: 50%; transform: translateX(-50%); top: 8%; font-size: 3rem; opacity: 0.12; animation: floatSway 8s ease-in-out infinite alternate; z-index: 0; pointer-events: none; color: #4A8DB7 !important; -webkit-text-stroke: 1.5px #4A8DB7 !important; }
        @keyframes floatSway { 0% { transform: translateY(0px) rotate(-2deg); } 50% { transform: translateY(-18px) rotate(0deg); } 100% { transform: translateY(-8px) rotate(2deg); } }
        .friend-container { max-width: 1100px; margin: 0 auto; background: rgba(255, 254, 248, 0.5); backdrop-filter: blur(4px); border-radius: var(--radius-xl); padding: 2rem 2.5rem; border: 1px solid rgba(209, 233, 246, 0.2); box-shadow: var(--shadow-soft); position: relative; z-index: 1; }
        .friend-header { text-align: center; padding: 1rem 0 1.5rem; border-bottom: 1px dashed rgba(209, 233, 246, 0.3); margin-bottom: 2rem; }
        .friend-header h1 { font-size: 2.8rem; font-weight: var(--font-weight-extra-bold); background: linear-gradient(135deg, #4A6A7A 0%, #6A7AAA 30%, #9A8AC0 55%, #B8A4E0 75%, #D4C5F9 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 0.3rem; }
        .friend-header .subtitle { font-size: 1.1rem; font-weight: var(--font-weight-light); color: var(--color-soft-brown); opacity: 0.6; letter-spacing: 0.06em; }
        .friend-header .back-link { display: inline-block; margin-top: 0.8rem; padding: 0.4rem 1.5rem; border-radius: var(--radius-xl); background: rgba(212, 197, 249, 0.2); border: 1px solid rgba(212, 197, 249, 0.2); color: var(--color-soft-brown); text-decoration: none; font-size: 0.9rem; transition: all var(--transition-medium); }
        .friend-header .back-link:hover { background: rgba(212, 197, 249, 0.4); }
        .characters-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 1.5rem; max-width: 700px; margin: 0 auto; }
        .character-card { background: rgba(255, 254, 248, 0.5); backdrop-filter: blur(4px); border-radius: var(--radius-xl); padding: 1.2rem 0.8rem; border: 2px solid rgba(212, 197, 249, 0.15); box-shadow: var(--shadow-soft); transition: all var(--transition-medium); cursor: pointer; text-align: center; }
        .character-card:hover { transform: translateY(-6px) scale(1.02); box-shadow: var(--shadow-float); border-color: #D4C5F9; }
        .character-card.selected { border-color: #D4C5F9; background: rgba(212, 197, 249, 0.15); box-shadow: var(--shadow-float); }
        .character-card .char-emoji { font-size: 3.5rem; display: block; animation: bounceChar 2s ease-in-out infinite; }
        @keyframes bounceChar { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        .character-card .char-name { font-size: 1rem; font-weight: var(--font-weight-medium); color: var(--color-charcoal); margin-top: 0.3rem; }
        .character-card .char-desc { font-size: 0.75rem; color: var(--color-soft-brown); opacity: 0.5; }
        .friend-select { text-align: center; margin-bottom: 2rem; }
        .friend-select p { font-size: 1.2rem; color: var(--color-soft-brown); opacity: 0.6; margin-bottom: 1rem; }
        @media (max-width: 768px) {
            .cloud-float-left, .cloud-float-right { font-size: 3rem !important; }
            .cloud-float-center { display: none; }
            .friend-container { padding: 1.2rem; border-radius: var(--radius-lg); }
            .friend-header h1 { font-size: 2rem; }
            .characters-grid { grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 1rem; }
            .character-card .char-emoji { font-size: 2.8rem; }
        }
        @media (max-width: 480px) {
            body { padding: 0.8rem; }
            .friend-container { padding: 0.8rem; }
            .friend-header h1 { font-size: 1.6rem; }
            .characters-grid { grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 0.8rem; }
            .character-card { padding: 0.8rem 0.5rem; }
            .character-card .char-emoji { font-size: 2.2rem; }
            .character-card .char-name { font-size: 0.8rem; }
            .cloud-float-left, .cloud-float-right { font-size: 2rem !important; opacity: 0.2 !important; }
        }
        /* ============================================================
   انیمیشن‌های فوتر
   ============================================================ */

/* نقطه‌های شناور */
@keyframes floatDot {
    0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.15; }
    25% { transform: translate(20px, -30px) scale(1.5); opacity: 0.25; }
    50% { transform: translate(-10px, -50px) scale(0.8); opacity: 0.08; }
    75% { transform: translate(15px, -20px) scale(1.3); opacity: 0.2; }
}

/* ستاره‌های چشمک‌زن */
@keyframes sparkleStar {
    0%, 100% { opacity: 0.2; transform: scale(0.8) rotate(0deg); }
    50% { opacity: 0.5; transform: scale(1.4) rotate(20deg); }
}

/* ماه شناور */
@keyframes floatMoon {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-12px) rotate(5deg); }
}

/* کلمات یکی یکی */
@keyframes wordFade {
    0% { opacity: 0; transform: translateY(20px) scale(0.9); filter: blur(2px); }
    100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
}

/* خط نورانی */
@keyframes shineLine {
    0% { left: -100%; }
    100% { left: 200%; }
}

/* محو شدن از پایین */
@keyframes fadeUp {
    0% { opacity: 0; transform: translateY(15px); }
    100% { opacity: 0.3; transform: translateY(0); }
}

/* تپش قلب */
@keyframes heartPulse {
    0%, 100% { opacity: 0.1; transform: scale(1); }
    50% { opacity: 0.2; transform: scale(1.15); }
}
    </style>
</head>
<body>
    <div class="cloud-float-left">☁️</div>
    <div class="cloud-float-right">☁️</div>
    <div class="cloud-float-center">☁️</div>
    <div class="friend-container">
        <header class="friend-header">
            <h1>🤗 دوست من</h1>
            <p class="subtitle">✨ یه دوست بامزه برای همراهی در سایت انتخاب کن! ✨</p>
            <a href="index.html" class="back-link">← بازگشت به سایت اصلی</a>
        </header>
        <div class="friend-select">
            <p>👆 یکی از دوستات رو انتخاب کن:</p>
            <div class="characters-grid" id="charactersGrid"></div>
        </div>
    </div>

    <script>
        // ====== کاراکترها (با کتاب) ======
        const characters = [
        { id: 'moon', emoji: '🌙', name: 'ماه‌جان', desc: 'دوست آروم و مهربون' },
        { id: 'star', emoji: '⭐', name: 'ستاره‌جان', desc: 'دوست پرانرژی و شاد' },
        { id: 'cloud', emoji: '☁️', name: 'ابرجان', desc: 'دوست رؤیایی و بامزه' },
        { id: 'rabbit', emoji: '🐰', name: 'خرگوشک', desc: 'دوست ناز و بازیگوش' },
        { id: 'bear', emoji: '🧸', name: 'خرس کوچولو', desc: 'دوست مهربون و بغل‌کردنی' },
        { id: 'book', emoji: '📚', name: 'کتاب', desc: 'دوست قصه‌گو و دانا' },
        { id: 'brush', emoji: '🖌️', name: 'قلمو', desc: 'دوست نقاش و خلاق' },
        { id: 'robot', emoji: '🤖', name: 'ربات کوچولو', desc: 'دوست فناوری و بازی' }  // ← جدید
    ];

        const grid = document.getElementById('charactersGrid');

        function renderCharacters() {
            grid.innerHTML = characters.map((char, index) => `
                <div class="character-card" data-index="${index}" onclick="selectChar(${index})">
                    <span class="char-emoji">${char.emoji}</span>
                    <div class="char-name">${char.name}</div>
                    <div class="char-desc">${char.desc}</div>
                </div>
            `).join('');
        }

        function selectChar(index) {
            const char = characters[index];
            localStorage.setItem('myFriend', JSON.stringify({
                id: char.id,
                name: char.name,
                emoji: char.emoji
            }));

            document.querySelectorAll('.character-card').forEach((card, i) => {
                card.classList.toggle('selected', i === index);
            });

            alert(`✨ ${char.emoji} ${char.name} انتخاب شد! \nاز این به بعد ${char.name} همراه شما در سایت هست!`);
            
            // صفحه رو رفرش کن تا دوست جدید نمایش داده بشه
            location.reload();
        }

        function checkSaved() {
            const saved = localStorage.getItem('myFriend');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    const index = characters.findIndex(c => c.id === data.id);
                    if (index !== -1) {
                        document.querySelectorAll('.character-card').forEach((card, i) => {
                            card.classList.toggle('selected', i === index);
                        });
                    }
                } catch (e) {}
            }
        }

        renderCharacters();
        checkSaved();
    </script>
     <!-- ===== پخش‌کننده موسیقی سراسری ===== -->
<script src="music-player.js"></script>

    <audio id="bgMusic" loop>
        <source src="background-music.mp3" type="audio/mpeg">
    </audio>
    <button onclick="toggleMusic()" style="position:fixed;bottom:20px;left:20px;z-index:9999;padding:10px 15px;border-radius:50px;border:2px solid #D4C5F9;background:rgba(255,254,248,0.9);backdrop-filter:blur(8px);cursor:pointer;font-size:18px;box-shadow:0 4px 15px rgba(160,130,200,0.2);">
        <span id="musicIcon">🔊</span>
    </button>
    
    <script>
        var audio = document.getElementById('bgMusic');
        var isPlaying = false;
        var icon = document.getElementById('musicIcon');
    
        function toggleMusic() {
            if (isPlaying) {
                audio.pause();
                icon.textContent = '🔇';
                isPlaying = false;
            } else {
                audio.play().then(function() {
                    icon.textContent = '🔊';
                    isPlaying = true;
                }).catch(function() {
                    alert('برای پخش موسیقی روی صفحه کلیک کنید');
                });
            }
        }
    
        // تلاش برای پخش خودکار
        setTimeout(function() {
            audio.play().then(function() {
                icon.textContent = '🔊';
                isPlaying = true;
            }).catch(function() {});
        }, 1000);
    
        // با اولین کلیک کاربر، پخش کن
        document.addEventListener('click', function() {
            if (!isPlaying) {
                audio.play().then(function() {
                    icon.textContent = '🔊';
                    isPlaying = true;
                }).catch(function() {});
            }
        }, { once: true });
    </script>

    <!-- ============================================================ -->
    <!-- ===== فوتر با انیمیشن‌های خیره‌کننده ===== -->
    <!-- ============================================================ -->
    <div style="text-align:center; padding:2.5rem 1.5rem 1rem; margin:2.5rem auto 0; max-width:900px; border-top:1px solid rgba(209,233,246,0.1); position:relative; overflow:hidden; background:linear-gradient(135deg, rgba(212,197,249,0.03), rgba(209,233,246,0.03)); border-radius:var(--radius-lg);">
        
        <!-- پس‌زمینه با نقطه‌های نورانی متحرک -->
        <div style="position:absolute; inset:0; overflow:hidden; pointer-events:none;">
            <span style="position:absolute; top:10%; left:5%; width:4px; height:4px; background:#D4C5F9; border-radius:50%; opacity:0.15; animation: floatDot 8s ease-in-out infinite;"></span>
            <span style="position:absolute; top:30%; right:10%; width:3px; height:3px; background:#D4C5F9; border-radius:50%; opacity:0.1; animation: floatDot 10s ease-in-out infinite 2s;"></span>
            <span style="position:absolute; bottom:20%; left:15%; width:5px; height:5px; background:#D4C5F9; border-radius:50%; opacity:0.08; animation: floatDot 7s ease-in-out infinite 1s;"></span>
            <span style="position:absolute; bottom:40%; right:5%; width:3px; height:3px; background:#D4C5F9; border-radius:50%; opacity:0.12; animation: floatDot 9s ease-in-out infinite 3s;"></span>
            <span style="position:absolute; top:60%; left:30%; width:4px; height:4px; background:#D4C5F9; border-radius:50%; opacity:0.06; animation: floatDot 11s ease-in-out infinite 0.5s;"></span>
            <span style="position:absolute; top:15%; left:50%; width:6px; height:6px; background:#D4C5F9; border-radius:50%; opacity:0.04; animation: floatDot 13s ease-in-out infinite 1.5s;"></span>
        </div>

        <!-- ستاره‌های درخشان -->
        <div style="position:relative; z-index:1;">
            <div style="display:flex; justify-content:center; gap:0.8rem; margin-bottom:0.5rem; font-size:1.5rem; opacity:0.2;">
                <span style="display:inline-block; animation: sparkleStar 2.5s ease-in-out infinite;">✦</span>
                <span style="display:inline-block; animation: sparkleStar 2.5s ease-in-out infinite 0.6s;">✦</span>
                <span style="display:inline-block; animation: sparkleStar 2.5s ease-in-out infinite 1.2s;">✦</span>
                <span style="display:inline-block; animation: sparkleStar 2.5s ease-in-out infinite 0.3s;">✦</span>
                <span style="display:inline-block; animation: sparkleStar 2.5s ease-in-out infinite 0.9s;">✦</span>
            </div>

            <!-- آیکون ماه با انیمیشن -->
            <div style="font-size:2.8rem; margin-bottom:0.5rem; opacity:0.2; animation: floatMoon 5s ease-in-out infinite; display:inline-block;">🌙</div>

            <!-- متن اصلی با انیمیشن کلمات -->
            <p style="font-size:1.15rem; font-weight:300; color:var(--color-charcoal); letter-spacing:0.02em; line-height:2.4; max-width:600px; margin:0 auto; position:relative; z-index:1;">
                <span style="display:inline-block; animation: wordFade 0.8s ease-out 0.1s both;">اینجا</span>
                <span style="display:inline-block; animation: wordFade 0.8s ease-out 0.3s both;">جایی</span>
                <span style="display:inline-block; animation: wordFade 0.8s ease-out 0.5s both;">است</span>
                <span style="display:inline-block; animation: wordFade 0.8s ease-out 0.7s both;">که</span>
                <br>
                <span style="display:inline-block; animation: wordFade 0.8s ease-out 0.9s both;">رویاهای</span>
                <span style="display:inline-block; animation: wordFade 0.8s ease-out 1.1s both;">کوچک</span>
                <br>
                <span style="display:inline-block; animation: wordFade 0.8s ease-out 1.3s both;">آرام</span>
                <span style="display:inline-block; animation: wordFade 0.8s ease-out 1.5s both;">آرام</span>
                <span style="display:inline-block; animation: wordFade 0.8s ease-out 1.7s both;">به</span>
                <br>
                <span style="display:inline-block; animation: wordFade 0.8s ease-out 1.9s both; color:#4A8DB7; font-weight:400;">خاطره‌های</span>
                <span style="display:inline-block; animation: wordFade 0.8s ease-out 2.1s both; color:#4A8DB7; font-weight:400;">بزرگ</span>
                <span style="display:inline-block; animation: wordFade 0.8s ease-out 2.3s both;">تبدیل</span>
                <span style="display:inline-block; animation: wordFade 0.8s ease-out 2.5s both;">می‌شوند.</span>
            </p>

            <!-- خط نورانی با انیمیشن -->
            <div style="width:120px; height:2px; background:linear-gradient(90deg, transparent, #D4C5F9, transparent); margin:1rem auto; position:relative; overflow:hidden; border-radius:10px;">
                <span style="position:absolute; top:0; left:-100%; width:100%; height:100%; background:linear-gradient(90deg, transparent, #9A8AC0, transparent); animation: shineLine 3s ease-in-out infinite;"></span>
            </div>

            <!-- زیرنویس با انیمیشن -->
            <p style="font-size:0.8rem; color:var(--color-soft-brown); opacity:0.3; letter-spacing:0.06rem; animation: fadeUp 1s ease-out 2.8s both;">
                ✦ دفترچه خاطرات یک قصه‌ی شیرین ✦
            </p>

            <!-- قلب‌های تپنده -->
            <div style="margin-top:0.6rem; font-size:1.2rem; opacity:0.1; letter-spacing:0.4rem; animation: heartPulse 3s ease-in-out infinite;">
                ♡ ♡ ♡
            </div>
        </div>
    </div>

</body>
</html>
